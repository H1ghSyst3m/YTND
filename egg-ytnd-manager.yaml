_comment: 'YTND Manager Pelican egg'
meta:
  version: PLCN_v3
  update_url: null
exported_at: '2026-07-06T00:00:00+00:00'
name: 'YTND Manager'
author: durmazmalik@protonmail.com
uuid: 8fd0ed3b-3260-41a8-b47b-8ec8c688fc64
description: |-
  Web-based YouTube audio manager with a FastAPI backend, React manager UI,
  SQLite storage, download queue, real-time WebSocket updates, and optional WebDAV access.
image: null
tags:
  - audio
  - youtube
  - python
  - web
features: {  }
docker_images:
  'Python 3.13': 'ghcr.io/pelican-eggs/yolks:python_3.13'
file_denylist: {  }
startup_commands:
  Default: >-
    bash -lc 'if [ -z "${MANAGER_BASE_URL:-}" ]; then unset MANAGER_BASE_URL; fi; export PATH=/home/container/bin:${PATH}; export MANAGER_HOST=0.0.0.0; export MANAGER_PORT={{SERVER_PORT}}; export DATA_ROOT=/home/container/data; export DATABASE_FILE=/home/container/data/ytnd.db; export COOKIES_FILE=/home/container/data/cookies.txt; export FFMPEG_PATH=/home/container/bin/ffmpeg; export YTND_JS_RUNTIME_PATH=/home/container/bin/deno; if [ -x "$YTND_JS_RUNTIME_PATH" ]; then echo "Deno version: $($YTND_JS_RUNTIME_PATH --version | head -n 1)"; else echo "WARNING: Deno runtime missing at $YTND_JS_RUNTIME_PATH"; fi; echo "Checking yt-dlp update..."; /home/container/.venv/bin/python -m ensurepip --upgrade >/dev/null 2>&1 || true; if /home/container/.venv/bin/python -m pip install --disable-pip-version-check --no-cache-dir --upgrade "yt-dlp[default]"; then echo "yt-dlp version: $(/home/container/.venv/bin/python -m yt_dlp --version)"; else echo "WARNING: yt-dlp update failed; continuing with installed version"; fi; exec /home/container/.venv/bin/python -m ytnd.manager_server'
config:
  files: {  }
  startup:
    done:
      - 'Uvicorn running on'
      - 'Application startup complete'
  logs: {  }
  stop: ^C
scripts:
  installation:
    script: |-
      #!/bin/bash
      set -e

      NODE_VERSION="v24.15.0"
      NPM_VERSION="11.12.1"
      UV_VERSION="0.10.8"
      DENO_VERSION="v2.9.2"

      cd /mnt/server

      echo "Installing build dependencies..."
      apt-get update
      apt-get install -y --no-install-recommends \
          ca-certificates \
          curl \
          git \
          rsync \
          tar \
          unzip \
          xz-utils
      rm -rf /var/lib/apt/lists/*

      ARCH="$(uname -m)"
      case "${ARCH}" in
          x86_64|amd64)
              NODE_ARCH="x64"
              FFMPEG_ARCH="amd64"
              DENO_ARCH="x86_64-unknown-linux-gnu"
              ;;
          aarch64|arm64)
              NODE_ARCH="arm64"
              FFMPEG_ARCH="arm64"
              DENO_ARCH="aarch64-unknown-linux-gnu"
              ;;
          *)
              echo "Unsupported architecture: ${ARCH}"
              exit 1
              ;;
      esac

      echo "Installing Node.js ${NODE_VERSION}..."
      curl -fsSL "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-linux-${NODE_ARCH}.tar.xz" -o /tmp/node.tar.xz
      rm -rf /opt/node-${NODE_VERSION}-linux-${NODE_ARCH}
      tar -xJf /tmp/node.tar.xz -C /opt
      rm -f /tmp/node.tar.xz
      export PATH="/opt/node-${NODE_VERSION}-linux-${NODE_ARCH}/bin:${PATH}"
      npm install -g "npm@${NPM_VERSION}"

      echo "Fetching YTND from https://github.com/H1ghSyst3m/YTND.git (main)..."
      rm -rf /tmp/ytnd-src
      git clone --depth 1 --branch main "https://github.com/H1ghSyst3m/YTND.git" /tmp/ytnd-src

      mkdir -p data
      if [ -f cookies.txt ] && [ ! -f data/cookies.txt ]; then
          cp cookies.txt data/cookies.txt
      fi

      rsync -a --delete \
          --exclude '/data/' \
          --exclude '/cookies.txt' \
          /tmp/ytnd-src/ /mnt/server/
      rm -rf /tmp/ytnd-src

      mkdir -p data bin

      # Install generated runtime binaries after rsync --delete so they remain persisted.
      echo "Installing Deno ${DENO_VERSION}..."
      DENO_ASSET="deno-${DENO_ARCH}.zip"
      curl -fsSL "https://github.com/denoland/deno/releases/download/${DENO_VERSION}/${DENO_ASSET}" -o "/tmp/${DENO_ASSET}"
      curl -fsSL "https://github.com/denoland/deno/releases/download/${DENO_VERSION}/${DENO_ASSET}.sha256sum" -o "/tmp/${DENO_ASSET}.sha256sum"
      (cd /tmp && sha256sum -c "${DENO_ASSET}.sha256sum")
      rm -f /mnt/server/bin/deno /mnt/server/bin/deno.tmp
      unzip -p "/tmp/${DENO_ASSET}" deno > /mnt/server/bin/deno.tmp
      chmod 0755 /mnt/server/bin/deno.tmp
      mv /mnt/server/bin/deno.tmp /mnt/server/bin/deno
      rm -f "/tmp/${DENO_ASSET}" "/tmp/${DENO_ASSET}.sha256sum"
      test -x /mnt/server/bin/deno
      /mnt/server/bin/deno --version

      echo "Installing uv ${UV_VERSION} and Python dependencies..."
      python -m pip install --no-cache-dir --upgrade pip
      python -m pip install --no-cache-dir "uv==${UV_VERSION}"
      python -m uv sync --frozen --no-dev

      echo "Updating yt-dlp to the latest PyPI release..."
      python -m uv pip install --python /mnt/server/.venv/bin/python --upgrade "pip" "yt-dlp[default]"
      echo "Installed yt-dlp version: $(/mnt/server/.venv/bin/python -m yt_dlp --version)"

      echo "Building manager frontend..."
      cd /mnt/server/manager-frontend
      npm ci
      npm run build
      rm -rf node_modules
      cd /mnt/server

      echo "Installing static FFmpeg..."
      curl -fsSL "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-${FFMPEG_ARCH}-static.tar.xz" -o /tmp/ffmpeg.tar.xz
      FFMPEG_ROOT="$(tar -tJf /tmp/ffmpeg.tar.xz | head -n 1 | cut -d/ -f1)"
      rm -f /mnt/server/bin/ffmpeg /mnt/server/bin/ffprobe
      tar -xJf /tmp/ffmpeg.tar.xz -C /mnt/server/bin --strip-components=1 \
          "${FFMPEG_ROOT}/ffmpeg" \
          "${FFMPEG_ROOT}/ffprobe"
      chmod 0755 /mnt/server/bin/ffmpeg /mnt/server/bin/ffprobe
      rm -f /tmp/ffmpeg.tar.xz

      test -x /mnt/server/bin/deno
      /mnt/server/bin/deno --version
      test -x /mnt/server/bin/ffmpeg
      /mnt/server/bin/ffmpeg -version | head -n 1

      echo "Installation completed..."
    container: 'python:3.13-slim-bookworm'
    entrypoint: bash
variables:
  -
    sort: 1
    name: 'Initial Admin Username'
    description: 'Username for the first YTND admin account. Used only when the database has no credentialed user yet.'
    env_variable: INITIAL_ADMIN_USERNAME
    default_value: admin
    user_viewable: true
    user_editable: true
    rules:
      - required
      - string
      - 'min:3'
      - 'max:64'
      - 'regex:/^[A-Za-z0-9_-]+$/'
  -
    sort: 2
    name: 'Initial Admin Password'
    description: 'Password for the first YTND admin account. Used only when the database has no credentialed user yet.'
    env_variable: INITIAL_ADMIN_PASSWORD
    default_value: ''
    user_viewable: false
    user_editable: true
    rules:
      - required
      - string
      - 'min:8'
      - 'max:128'
  -
    sort: 3
    name: 'Manager Secret'
    description: 'Secret used to sign YTND sessions. Generate a random value and keep it unchanged after the first install.'
    env_variable: MANAGER_SECRET
    default_value: ''
    user_viewable: false
    user_editable: true
    rules:
      - required
      - string
      - 'min:32'
      - 'max:256'
  -
    sort: 4
    name: 'Manager Base URL'
    description: 'Optional public base URL, for example https://ytnd.example.com. Leave empty for YTND defaults.'
    env_variable: MANAGER_BASE_URL
    default_value: ''
    user_viewable: true
    user_editable: true
    rules:
      - nullable
      - string
      - 'max:255'
  -
    sort: 5
    name: 'Enable WebDAV'
    description: 'Expose downloaded audio through the YTND WebDAV endpoint on the same server port.'
    env_variable: WEBDAV_ENABLED
    default_value: 1
    user_viewable: true
    user_editable: true
    rules:
      - required
      - boolean
