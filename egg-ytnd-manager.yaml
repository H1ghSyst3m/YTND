_comment: 'YTND Manager Pelican egg'
meta:
  version: PLCN_v3
  update_url: null
exported_at: '2026-07-06T00:00:00+00:00'
name: 'YTND Manager'
author: durmazmalik@protonmail.com
uuid: 8fd0ed3b-3260-41a8-b47b-8ec8c688fc64
description: |-
  Web-based YouTube audio manager with a FastAPI backend, React manager UI,
  SQLite storage, download queue, real-time WebSocket updates, and optional WebDAV access.
image: null
tags:
  - audio
  - youtube
  - python
  - web
features: {  }
docker_images:
  'Python 3.13': 'ghcr.io/pelican-eggs/yolks:python_3.13'
file_denylist: {  }
startup_commands:
  Default: >-
    bash -lc 'if [ -z "${MANAGER_BASE_URL:-}" ]; then unset MANAGER_BASE_URL; fi; export MANAGER_HOST=0.0.0.0; export MANAGER_PORT="{{MANAGER_PORT}}"; export DATA_ROOT=/home/container/data; export DATABASE_FILE=/home/container/data/ytnd.db; export COOKIES_FILE=/home/container/data/cookies.txt; export FFMPEG_PATH=/home/container/bin/ffmpeg; export PATH="/home/container/bin:${PATH}"; echo "Checking yt-dlp update..."; /home/container/.venv/bin/python -m ensurepip --upgrade >/dev/null 2>&1 || true; if /home/container/.venv/bin/python -m pip install --disable-pip-version-check --no-cache-dir --upgrade "yt-dlp[default]"; then echo "yt-dlp version: $(/home/container/.venv/bin/python -m yt_dlp --version)"; else echo "WARNING: yt-dlp update failed; continuing with installed version"; fi; if command -v deno >/dev/null 2>&1; then echo "deno version: $(deno --version | head -n 1)"; else echo "WARNING: deno not found; YouTube JS challenge support may be limited"; fi; exec /home/container/.venv/bin/python -m ytnd.manager_server'
config:
  files: {  }
  startup:
    done:
      - 'Uvicorn running on'
      - 'Application startup complete'
  logs: {  }
  stop: ^C
scripts:
  installation:
    script: |-
      #!/bin/bash
      set -e

      NODE_VERSION="v24.15.0"
      NPM_VERSION="11.12.1"
      UV_VERSION="0.10.8"
      DENO_VERSION="v2.3.7"

      cd /mnt/server

      echo "Installing build dependencies..."
      apt-get update
      apt-get install -y --no-install-recommends \
          ca-certificates \
          curl \
          git \
          rsync \
          tar \
          unzip \
          xz-utils
      rm -rf /var/lib/apt/lists/*

      ARCH="$(uname -m)"
      case "${ARCH}" in
          x86_64|amd64)
              NODE_ARCH="x64"
              FFMPEG_ARCH="amd64"
              DENO_ARCH="x86_64-unknown-linux-gnu"
              ;;
          aarch64|arm64)
              NODE_ARCH="arm64"
              FFMPEG_ARCH="arm64"
              DENO_ARCH="aarch64-unknown-linux-gnu"
              ;;
          *)
              echo "Unsupported architecture: ${ARCH}"
              exit 1
              ;;
      esac

      echo "Installing Node.js ${NODE_VERSION}..."
      curl -fsSL "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-linux-${NODE_ARCH}.tar.xz" -o /tmp/node.tar.xz
      rm -rf /opt/node-${NODE_VERSION}-linux-${NODE_ARCH}
      tar -xJf /tmp/node.tar.xz -C /opt
      rm -f /tmp/node.tar.xz
      export PATH="/opt/node-${NODE_VERSION}-linux-${NODE_ARCH}/bin:${PATH}"
      npm install -g "npm@${NPM_VERSION}"

      echo "Fetching YTND from https://github.com/H1ghSyst3m/YTND.git (main)..."
      rm -rf /tmp/ytnd-src
      git clone --depth 1 --branch main "https://github.com/H1ghSyst3m/YTND.git" /tmp/ytnd-src

      mkdir -p data
      if [ -f cookies.txt ] && [ ! -f data/cookies.txt ]; then
          cp cookies.txt data/cookies.txt
      fi

      rsync -a --delete \
          --exclude '/data/' \
          --exclude '/cookies.txt' \
          /tmp/ytnd-src/ /mnt/server/
      rm -rf /tmp/ytnd-src

      mkdir -p data bin

      echo "Installing uv ${UV_VERSION} and Python dependencies..."
      python -m pip install --no-cache-dir --upgrade pip
      python -m pip install --no-cache-dir "uv==${UV_VERSION}"
      python -m uv sync --frozen --no-dev

      echo "Updating yt-dlp to the latest PyPI release..."
      python -m uv pip install --python /mnt/server/.venv/bin/python --upgrade "pip" "yt-dlp[default]"
      echo "Installed yt-dlp version: $(/mnt/server/.venv/bin/python -m yt_dlp --version)"

      echo "Building manager frontend..."
      cd /mnt/server/manager-frontend
      npm ci
      npm run build
      rm -rf node_modules
      cd /mnt/server

      echo "Installing static FFmpeg..."
      curl -fsSL "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-${FFMPEG_ARCH}-static.tar.xz" -o /tmp/ffmpeg.tar.xz
      FFMPEG_ROOT="$(tar -tJf /tmp/ffmpeg.tar.xz | head -n 1 | cut -d/ -f1)"
      rm -f /mnt/server/bin/ffmpeg /mnt/server/bin/ffprobe
      tar -xJf /tmp/ffmpeg.tar.xz -C /mnt/server/bin --strip-components=1 \
          "${FFMPEG_ROOT}/ffmpeg" \
          "${FFMPEG_ROOT}/ffprobe"
      chmod 0755 /mnt/server/bin/ffmpeg /mnt/server/bin/ffprobe
      rm -f /tmp/ffmpeg.tar.xz

      echo "Installing Deno runtime for yt-dlp YouTube JS challenges..."
      rm -f /tmp/deno.zip
      if curl -fsSL "https://github.com/denoland/deno/releases/download/${DENO_VERSION}/deno-${DENO_ARCH}.zip" -o /tmp/deno.zip \
          && unzip -oq /tmp/deno.zip -d /mnt/server/bin \
          && chmod 0755 /mnt/server/bin/deno; then
          if /mnt/server/bin/deno --version >/tmp/deno-version.txt 2>/dev/null; then
              echo "Installed Deno version: $(head -n 1 /tmp/deno-version.txt)"
          else
              echo "WARNING: Deno was downloaded but could not be executed. Configure YTDLP_JS_RUNTIME_PATH manually or reinstall to restore YouTube JS challenge support."
          fi
      else
          echo "WARNING: Deno install failed; continuing without a JavaScript runtime. Configure YTDLP_JS_RUNTIME_PATH manually or reinstall to restore YouTube JS challenge support."
      fi
      rm -f /tmp/deno.zip /tmp/deno-version.txt

      echo "Installation completed..."
    container: 'python:3.13-slim-bookworm'
    entrypoint: bash
variables:
  -
    sort: 1
    name: 'Initial Admin Username'
    description: 'Username for the first YTND admin account. Used only when the database has no credentialed user yet.'
    env_variable: INITIAL_ADMIN_USERNAME
    default_value: admin
    user_viewable: true
    user_editable: true
    rules:
      - required
      - string
      - 'min:3'
      - 'max:64'
      - 'regex:/^[A-Za-z0-9_-]+$/'
  -
    sort: 2
    name: 'Initial Admin Password'
    description: 'Password for the first YTND admin account. Used only when the database has no credentialed user yet.'
    env_variable: INITIAL_ADMIN_PASSWORD
    default_value: ''
    user_viewable: false
    user_editable: true
    rules:
      - required
      - string
      - 'min:8'
      - 'max:128'
  -
    sort: 3
    name: 'Manager Secret'
    description: 'Secret used to sign YTND sessions. Generate a random value and keep it unchanged after the first install.'
    env_variable: MANAGER_SECRET
    default_value: ''
    user_viewable: false
    user_editable: true
    rules:
      - required
      - string
      - 'min:32'
      - 'max:256'
  -
    sort: 4
    name: 'Manager Port'
    description: 'Port the YTND manager binds to. This must match the Pelican server allocation port.'
    env_variable: MANAGER_PORT
    default_value: 9863
    user_viewable: true
    user_editable: true
    rules:
      - required
      - integer
      - 'between:1,65535'
  -
    sort: 5
    name: 'Manager Base URL'
    description: 'Optional public base URL, for example https://ytnd.example.com. Leave empty for YTND defaults.'
    env_variable: MANAGER_BASE_URL
    default_value: ''
    user_viewable: true
    user_editable: true
    rules:
      - nullable
      - string
      - 'max:255'
  -
    sort: 6
    name: 'Enable WebDAV'
    description: 'Expose downloaded audio through the YTND WebDAV endpoint on the same server port.'
    env_variable: WEBDAV_ENABLED
    default_value: true
    user_viewable: true
    user_editable: true
    rules:
      - required
      - boolean
  -
    sort: 7
    name: 'Download Workers'
    description: 'Parallel yt-dlp download workers. Keep this at 1 on shared or data-center servers unless you know the IP/session can handle more.'
    env_variable: DOWNLOAD_WORKERS
    default_value: 1
    user_viewable: true
    user_editable: true
    rules:
      - required
      - integer
      - 'between:1,8'
  -
    sort: 8
    name: 'Metadata Workers'
    description: 'Parallel yt-dlp metadata workers. Keep this at 1 for server reliability.'
    env_variable: YTDLP_METADATA_WORKERS
    default_value: 1
    user_viewable: true
    user_editable: true
    rules:
      - required
      - integer
      - 'between:1,8'
  -
    sort: 9
    name: 'Item Delay'
    description: 'Seconds to wait between sequential downloads when using one worker.'
    env_variable: YTDLP_ITEM_DELAY
    default_value: 1.5
    user_viewable: true
    user_editable: true
    rules:
      - required
      - numeric
      - 'between:0,30'
  -
    sort: 10
    name: 'Force IPv4'
    description: 'Force yt-dlp to use IPv4. Leave disabled unless the server IPv6 route is broken.'
    env_variable: YTDLP_FORCE_IPV4
    default_value: false
    user_viewable: true
    user_editable: true
    rules:
      - required
      - boolean
  -
    sort: 11
    name: 'yt-dlp JS Runtime'
    description: 'JavaScript runtime for YouTube EJS challenges. Deno is installed persistently by this egg.'
    env_variable: YTDLP_JS_RUNTIME
    default_value: deno
    user_viewable: true
    user_editable: true
    rules:
      - required
      - string
      - 'in:deno,node,quickjs,none'
  -
    sort: 12
    name: 'yt-dlp JS Runtime Path'
    description: 'Optional explicit runtime executable path. Leave empty to use PATH auto-detection.'
    env_variable: YTDLP_JS_RUNTIME_PATH
    default_value: ''
    user_viewable: true
    user_editable: true
    rules:
      - nullable
      - string
      - 'max:255'
  -
    sort: 13
    name: 'yt-dlp Proxy'
    description: 'Optional proxy URL passed to yt-dlp when the server IP is blocked or rate-limited.'
    env_variable: YTDLP_PROXY
    default_value: ''
    user_viewable: true
    user_editable: true
    rules:
      - nullable
      - string
      - 'max:255'
  -
    sort: 14
    name: 'yt-dlp Source Address'
    description: 'Optional local source IP address passed to yt-dlp.'
    env_variable: YTDLP_SOURCE_ADDRESS
    default_value: ''
    user_viewable: true
    user_editable: true
    rules:
      - nullable
      - string
      - 'max:128'
  -
    sort: 15
    name: 'yt-dlp User Agent'
    description: 'Optional custom User-Agent passed to yt-dlp. Leave empty for yt-dlp defaults.'
    env_variable: YTDLP_USER_AGENT
    default_value: ''
    user_viewable: true
    user_editable: true
    rules:
      - nullable
      - string
      - 'max:255'
  -
    sort: 16
    name: 'yt-dlp Extractor Args JSON'
    description: 'Advanced JSON object merged into yt-dlp extractor_args, for example YouTube PO-token settings. Do not paste secrets into logs.'
    env_variable: YTDLP_EXTRACTOR_ARGS_JSON
    default_value: ''
    user_viewable: false
    user_editable: true
    rules:
      - nullable
      - string
      - 'max:4000'
  -
    sort: 17
    name: 'yt-dlp Socket Timeout'
    description: 'yt-dlp socket timeout in seconds.'
    env_variable: YTDLP_SOCKET_TIMEOUT
    default_value: 30
    user_viewable: true
    user_editable: true
    rules:
      - required
      - integer
      - 'between:1,300'
  -
    sort: 18
    name: 'yt-dlp Retries'
    description: 'yt-dlp retry count for downloads and extraction.'
    env_variable: YTDLP_RETRIES
    default_value: 10
    user_viewable: true
    user_editable: true
    rules:
      - required
      - integer
      - 'between:0,50'
  -
    sort: 19
    name: 'yt-dlp Fragment Retries'
    description: 'yt-dlp retry count for media fragments.'
    env_variable: YTDLP_FRAGMENT_RETRIES
    default_value: 10
    user_viewable: true
    user_editable: true
    rules:
      - required
      - integer
      - 'between:0,50'
  -
    sort: 20
    name: 'yt-dlp Extractor Retries'
    description: 'yt-dlp retry count for extractor failures.'
    env_variable: YTDLP_EXTRACTOR_RETRIES
    default_value: 3
    user_viewable: true
    user_editable: true
    rules:
      - required
      - integer
      - 'between:0,20'
  -
    sort: 21
    name: 'yt-dlp Request Delay'
    description: 'Optional delay between yt-dlp HTTP requests in seconds.'
    env_variable: YTDLP_REQUEST_DELAY
    default_value: 0
    user_viewable: true
    user_editable: true
    rules:
      - required
      - numeric
      - 'between:0,30'
  -
    sort: 22
    name: 'yt-dlp Remote Components'
    description: 'Optional remote EJS components. Use true for ejs:github, or a comma-separated list such as ejs:github,ejs:npm.'
    env_variable: YTDLP_REMOTE_COMPONENTS
    default_value: ''
    user_viewable: true
    user_editable: true
    rules:
      - nullable
      - string
      - 'max:255'
  -
    sort: 23
    name: 'yt-dlp Android Retry'
    description: 'Enable a last-resort Android client retry after default extraction fails. Keep disabled unless diagnostics point to it.'
    env_variable: YTDLP_ANDROID_RETRY
    default_value: false
    user_viewable: true
    user_editable: true
    rules:
      - required
      - boolean
