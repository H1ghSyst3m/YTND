name: ytnd
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  path: ^1.9.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  file_picker: ^8.1.2
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  workmanager: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/logo.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
