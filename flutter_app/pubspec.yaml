name: ytnd
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.6
  path: ^1.9.0
  permission_handler: ^12.0.3
  connectivity_plus: ^7.2.0
  file_picker: ^11.0.2
  provider: ^6.1.2
  flutter_secure_storage: ^10.3.1
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/logo.png
  adaptive_icon_background: "#08111F"
  adaptive_icon_foreground: assets/logo_foreground.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
